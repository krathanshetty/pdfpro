<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Red Accent -->
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D"/>
      <stop offset="100%" stop-color="#C40000"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="48" fill="url(#bg)"/>

  <!-- Glow Border -->
  <rect
    x="28"
    y="28"
    width="456"
    height="456"
    rx="36"
    fill="none"
    stroke="url(#red)"
    stroke-width="4"
    opacity="0.35"/>

  <!-- PDF Document -->
  <g filter="url(#glow)">
    <path
      d="
      M145 90
      H285
      L365 170
      V405
      H145
      Z"
      fill="#111111"
      stroke="url(#red)"
      stroke-width="8"/>

    <!-- Fold -->
    <path
      d="M285 90 V170 H365"
      fill="none"
      stroke="url(#red)"
      stroke-width="8"/>

    <!-- PDF -->
    <text
      x="255"
      y="245"
      text-anchor="middle"
      font-family="Poppins,Arial,sans-serif"
      font-size="52"
      font-weight="700"
      fill="#FFFFFF">
      PDF
    </text>

    <!-- Lines -->
    <rect x="180" y="285" width="145" height="8" rx="4" fill="#FFFFFF" opacity=".9"/>
    <rect x="180" y="310" width="120" height="8" rx="4" fill="#FFFFFF" opacity=".75"/>
    <rect x="180" y="335" width="155" height="8" rx="4" fill="#FFFFFF" opacity=".6"/>
  </g>

  <!-- Privacy Shield -->
  <g transform="translate(360 330)" filter="url(#glow)">
    <path
      d="
      M0 -42
      L44 -20
      V12
      C44 48 20 72 0 84
      C-20 72 -44 48 -44 12
      V-20
      Z"
      fill="url(#red)"/>

    <!-- Check -->
    <path
      d="M-16 12
      L-2 28
      L18 -4"
      fill="none"
      stroke="white"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Bottom Text -->
  <text
    x="256"
    y="458"
    text-anchor="middle"
    font-family="Poppins,Arial,sans-serif"
    font-size="30"
    font-weight="700"
    fill="#FFFFFF">
    PDF PRO
  </text>

  <text
    x="256"
    y="485"
    text-anchor="middle"
    font-family="Poppins,Arial,sans-serif"
    font-size="15"
    fill="#BBBBBB">
    Your Privacy Partner
  </text>
</svg>
